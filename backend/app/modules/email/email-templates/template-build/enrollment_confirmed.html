<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="en">
  <head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
  </head>
  <body
    style="
      background-color: #fff;
      margin: auto;
      font-family: ui-sans-serif, system-ui, sans-serif;
      padding: 0.5rem;
    "
  >
    <table
      align="center"
      width="100%"
      border="0"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="
        border: 1px solid #eaeaea;
        border-radius: 0.25rem;
        margin: 40px auto;
        padding: 20px;
        max-width: 465px;
      "
    >
      <tr>
        <td>
          <table
            width="100%"
            border="0"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
          >
            <tr>
              <td style="padding-top: 0">
                <img
                  src="cid:legionLogo"
                  width="40"
                  height="37"
                  alt="Legion"
                  style="margin-top: 0"
                />
              </td>
            </tr>
          </table>
          <h1
            style="
              color: #000;
              font-size: 24px;
              font-weight: 400;
              text-align: center;
              padding: 0;
              margin: 30px 0;
            "
          >
            You're enrolled!
          </h1>
          <p style="font-size: 14px; line-height: 24px; color: #000">
            Hi {{ firstName }},
          </p>
          <p style="font-size: 14px; line-height: 24px; color: #000">
            You've successfully enrolled in
            <strong>{{ curriculumTitle }}</strong>. Your learning journey starts
            now — dive in whenever you're ready.
          </p>
          <table
            align="center"
            width="100%"
            border="0"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
            style="text-align: center; margin-top: 32px; margin-bottom: 32px"
          >
            <tr>
              <td>
                <a
                  href="{{ curriculumUrl }}"
                  target="_blank"
                  style="
                    background-color: #000;
                    border-radius: 0.25rem;
                    color: #fff;
                    font-size: 12px;
                    font-weight: 600;
                    text-decoration: none;
                    text-align: center;
                    padding: 12px 20px;
                    display: inline-block;
                  "
                >
                  Start Learning
                </a>
              </td>
            </tr>
          </table>
          <hr
            style="
              border: none;
              border-top: 1px solid #eaeaea;
              margin: 26px 0;
              width: 100%;
            "
          />
          <p style="color: #666; font-size: 12px; line-height: 24px">
            You're receiving this because you enrolled in a curriculum on Legion
            Grappling Academy.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
