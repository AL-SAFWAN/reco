name: Build, Push, and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.6
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "eu-west-2"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve

      - name: Get TF Outputs
        id: tfoutputs
        working-directory: terraform/environments/dev
        run: |
          terraform output -json > tf-outputs.json
          echo "CLUSTER_NAME=$(jq -r '.ecs_cluster_name.value' tf-outputs.json)" >> $GITHUB_ENV
          echo "SERVICE_NAME=$(jq -r '.ecs_service_name.value' tf-outputs.json)" >> $GITHUB_ENV

      - name: Login to Public ECR
        run: |
          aws ecr-public get-login-password --region "us-east-1" | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build Frontend Image
        run: |
          COMMIT_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          # Use ALB_DNS in build-arg if needed:
          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://test.legiongrappling.com:8443 \
            -t public.ecr.aws/m8h2m6a1/legion/frontend:latest \
            -t public.ecr.aws/m8h2m6a1/legion/frontend:${COMMIT_SHORT} \
            frontend/

      - name: Push Frontend Image
        run: |
          COMMIT_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          docker push public.ecr.aws/m8h2m6a1/legion/frontend:latest
          docker push public.ecr.aws/m8h2m6a1/legion/frontend:${COMMIT_SHORT}

      - name: Build Backend Image
        run: |
          COMMIT_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          docker build \
            -t public.ecr.aws/m8h2m6a1/legion/backend:latest \
            -t public.ecr.aws/m8h2m6a1/legion/backend:${COMMIT_SHORT} \
            backend/

      - name: Push Backend Image
        run: |
          COMMIT_SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          docker push public.ecr.aws/m8h2m6a1/legion/backend:latest
          docker push public.ecr.aws/m8h2m6a1/legion/backend:${COMMIT_SHORT}
      - name: Debug TF outputs
        run: |
          echo "CLUSTER_NAME is $CLUSTER_NAME"
          echo "SERVICE_NAME is $SERVICE_NAME"
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${CLUSTER_NAME}" \
            --service "${SERVICE_NAME}" \
            --force-new-deployment

      - name: Wait for ECS service to stabilize
        run: |
          aws ecs wait services-stable \
          --cluster "${CLUSTER_NAME}" \
          --services "${SERVICE_NAME}"
